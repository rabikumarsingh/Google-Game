<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <title>Voxel Countdown</title>
    <script type="module" crossorigin src="/assets/index-COJ9Yb5L.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-SUy4xMqB.css">
    <style>
      #audio-controls {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
      }
      #audio-controls:hover {
        background: rgba(0, 0, 0, 0.8);
        transform: scale(1.1);
      }
      #audio-status {
        color: white;
        font-size: 12px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <audio id="bg-music" loop>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="celebration-music">
      <source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mpeg">
    </audio>
    <div id="audio-controls" title="Toggle Music">
      <span id="audio-status">🔇</span>
    </div>

    <script>
      const music = document.getElementById('bg-music');
      const celebration = document.getElementById('celebration-music');
      const status = document.getElementById('audio-status');
      const controls = document.getElementById('audio-controls');
      
      window.gameMusic = {
        startBg: () => {
          celebration.pause();
          celebration.currentTime = 0;
          music.playbackRate = 1;
          music.play().then(() => {
            status.textContent = '🔊';
          }).catch(err => console.log('Music blocked'));
        },
        playCelebration: () => {
          music.pause();
          celebration.play().then(() => {
            status.textContent = '🎉';
          }).catch(err => console.log('Celebration blocked'));
        },
        toggle: () => {
          if (music.paused && celebration.paused) {
            music.play();
            status.textContent = '🔊';
          } else {
            music.pause();
            celebration.pause();
            status.textContent = '🔇';
          }
        },
        setStage: (stage) => {
          if (stage > 20) {
            music.playbackRate = 1.0;
          } else if (stage > 10) {
            music.playbackRate = 1.2;
          } else {
            music.playbackRate = 1.4;
          }
        }
      };

      controls.addEventListener('click', (e) => {
        e.stopPropagation();
        window.gameMusic.toggle();
      });
    </script>
  </body>
</html>
